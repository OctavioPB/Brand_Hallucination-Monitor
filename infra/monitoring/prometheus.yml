global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules
rule_files:
  - "alerts/*.yml"

scrape_configs:
  # Redpanda metrics (Kafka lag, throughput)
  - job_name: "redpanda"
    static_configs:
      - targets: ["redpanda:9644"]
    metrics_path: /public_metrics

  # Qdrant metrics
  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics

  # hallucin8 FastAPI — HTTP metrics + custom business metrics
  - job_name: "hallucin8-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
