name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Backend: lint, typecheck, test
  # -----------------------------------------------------------------------
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hallucin8
          POSTGRES_PASSWORD: hallucin8
          POSTGRES_DB: hallucin8
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://hallucin8:hallucin8@localhost:5432/hallucin8
      DATABASE_URL_SYNC: postgresql+psycopg2://hallucin8:hallucin8@localhost:5432/hallucin8
      REDIS_URL: redis://localhost:6379/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: hallucin8pass
      QDRANT_URL: http://localhost:6333
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      APP_ENV: test
      OPENAI_API_KEY: sk-test-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check apps/ tests/

      - name: Format check (ruff)
        run: ruff format --check apps/ tests/

      - name: Type check (mypy)
        run: mypy apps/api apps/workers
        continue-on-error: true  # strict mode ramp-up — errors are warnings until S2

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=apps/api --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # -----------------------------------------------------------------------
  # Frontend: lint, typecheck, build
  # -----------------------------------------------------------------------
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm --filter dashboard lint

      - name: Type check (tsc)
        run: pnpm --filter dashboard exec tsc --noEmit

      - name: Build
        run: pnpm --filter dashboard build

      - name: Test
        run: pnpm --filter dashboard test
