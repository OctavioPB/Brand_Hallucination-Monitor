version: "3.9"

# ---------------------------------------------------------------------------
# hallucin8 — local dev stack
# Core services start by default.
# Airflow:    docker-compose --profile airflow up
# Monitoring: docker-compose --profile monitoring up
# Everything: docker-compose --profile airflow --profile monitoring up
# ---------------------------------------------------------------------------

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.12
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://hallucin8:hallucin8@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: ""
  volumes:
    - ./infra/airflow/dags:/opt/airflow/dags
    - ./infra/airflow/logs:/opt/airflow/logs
    - ./infra/airflow/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
  profiles: ["airflow"]

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — relational metadata store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hallucin8-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hallucin8
      POSTGRES_PASSWORD: hallucin8
      POSTGRES_DB: hallucin8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hallucin8 -d hallucin8"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis 7 — task queue backend + embedding cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hallucin8-redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Qdrant — vector database for embeddings
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: hallucin8-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Neo4j 5.x — knowledge graph for semantic relationships
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.20-community
    container_name: hallucin8-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/hallucin8pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./infra/neo4j:/import
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible stream broker (dev simplicity)
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.1.9
    container_name: hallucin8-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"     # Kafka-compatible external
      - "29092:29092"   # Kafka-compatible internal
      - "8081:8081"     # Schema Registry
      - "8082:8082"     # Pandaproxy (REST)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redpanda Console — web UI for topic/message inspection
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: redpandadata/console:v2.6.1
    container_name: hallucin8-redpanda-console
    restart: unless-stopped
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: "http://redpanda:8081"
    ports:
      - "8080:8080"

  # ---------------------------------------------------------------------------
  # Airflow (profile: airflow) — only started with --profile airflow
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: hallucin8-airflow-web
    command: webserver
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: hallucin8-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: hallucin8-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@hallucin8.local \
          --password admin

  # ---------------------------------------------------------------------------
  # Prometheus (profile: monitoring)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: hallucin8-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles: ["monitoring"]

  # ---------------------------------------------------------------------------
  # Grafana (profile: monitoring)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.3
    container_name: hallucin8-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: hallucin8
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    profiles: ["monitoring"]

  # ---------------------------------------------------------------------------
  # PgBouncer — connection pooling proxy for PostgreSQL (profile: pgbouncer)
  # Sits between the API and PostgreSQL; reduces connection overhead under load.
  # URL for API: postgresql+asyncpg://hallucin8:hallucin8@pgbouncer:5432/hallucin8
  # IMPORTANT: asyncpg must use statement_cache_size=0 in transaction pool mode.
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: bitnami/pgbouncer:1.22.1
    container_name: hallucin8-pgbouncer
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: hallucin8
      POSTGRESQL_PASSWORD: hallucin8
      POSTGRESQL_DATABASE: hallucin8
      PGBOUNCER_PORT: 5432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 600
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U hallucin8"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["pgbouncer"]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redpanda_data:
  prometheus_data:
  grafana_data:
