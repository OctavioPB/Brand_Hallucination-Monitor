version: "3.9"

# ---------------------------------------------------------------------------
# hallucin8 — local dev stack
# Core services start by default.
# Airflow is behind the `airflow` profile: docker-compose --profile airflow up
# ---------------------------------------------------------------------------

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.12
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://hallucin8:hallucin8@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: ""
  volumes:
    - ./infra/airflow/dags:/opt/airflow/dags
    - ./infra/airflow/logs:/opt/airflow/logs
    - ./infra/airflow/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
  profiles: ["airflow"]

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — relational metadata store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hallucin8-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hallucin8
      POSTGRES_PASSWORD: hallucin8
      POSTGRES_DB: hallucin8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hallucin8 -d hallucin8"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis 7 — task queue backend + embedding cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hallucin8-redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Qdrant — vector database for embeddings
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: hallucin8-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Neo4j 5.x — knowledge graph for semantic relationships
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.20-community
    container_name: hallucin8-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/hallucin8pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./infra/neo4j:/import
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible stream broker (dev simplicity)
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.1.9
    container_name: hallucin8-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"     # Kafka-compatible external
      - "29092:29092"   # Kafka-compatible internal
      - "8081:8081"     # Schema Registry
      - "8082:8082"     # Pandaproxy (REST)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redpanda Console — web UI for topic/message inspection
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: redpandadata/console:v2.6.1
    container_name: hallucin8-redpanda-console
    restart: unless-stopped
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: "http://redpanda:8081"
    ports:
      - "8080:8080"

  # ---------------------------------------------------------------------------
  # Airflow (profile: airflow) — only started with --profile airflow
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: hallucin8-airflow-web
    command: webserver
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: hallucin8-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: hallucin8-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@hallucin8.local \
          --password admin

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redpanda_data:
